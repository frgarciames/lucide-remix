name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: Custom version (only for "custom" bump)
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          if [ "${{ inputs.bump }}" = "custom" ]; then
            npm version ${{ inputs.version }} --no-git-tag-version
          else
            npm version ${{ inputs.bump }} --no-git-tag-version
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "branch=release/v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create PR
        run: |
          git checkout -b "${{ steps.version.outputs.branch }}"
          git add package.json
          git add package-lock.json
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.branch }}" --force
          if gh pr view "${{ steps.version.outputs.branch }}" >/dev/null 2>&1; then
            echo "PR already exists, skipping."
          else
            gh pr create \
              --base master \
              --head "${{ steps.version.outputs.branch }}" \
              --title "Release v${{ steps.version.outputs.version }}" \
              --body "Bump version to v${{ steps.version.outputs.version }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
